<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <title>Sign in</title>
</head>
<body>
  <main class="card" role="main" aria-label="Sign in">
    <div class="logo-wrap" aria-hidden="true">
      <img class="logo" src="/IMG_1181.jpeg" alt="logo" />
    </div>

    <h1 class="title">Sign in</h1>

    <div class="login-form" aria-label="Login form area">
      <form id="login-form" onsubmit="onSubmit(event)" autocomplete="off" style="display:flex;flex-direction:column;gap:12px;">
        <label for="id" style="font-weight:700;color:var(--muted);font-size:13px;">Account ID</label>
        <div class="field">
          <input id="id" name="id" type="text" placeholder="Enter an ID (e.g. username#1234)" aria-label="Account ID" />
        </div>

        <label for="email" style="font-weight:700;color:var(--muted);font-size:13px;">Email tied to this account</label>
        <div class="field">
          <input id="email" name="email" type="email" placeholder="Enter the email for this account" aria-label="Account Email" />
        </div>

        <div style="display:flex;gap:8px;align-items:center;">
          <button type="submit" class="image-btn submit" aria-label="Sign in">
            <img class="btn-img" src="/IMG_1203.png" alt="button image" />
            <span class="btn-text">Sign in</span>
          </button>
        </div>
      </form>

      
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
